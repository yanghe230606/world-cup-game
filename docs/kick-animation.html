<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>足球角色帧动画</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.28), transparent 18%),
          linear-gradient(180deg, #277946 0%, #165d38 48%, #0d442b 100%);
        font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        cursor: pointer;
      }

      .stage {
        position: relative;
        display: grid;
        min-height: 100vh;
        place-items: end center;
        padding: 8vh 6vw 5vh;
      }

      .stage::before {
        position: absolute;
        inset: auto 0 0;
        height: 42vh;
        background:
          linear-gradient(90deg, transparent 0 49.8%, rgba(255, 255, 255, 0.28) 49.8% 50.2%, transparent 50.2%),
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.04) 0 90px, rgba(255, 255, 255, 0.08) 90px 180px);
        content: "";
      }

      .player {
        position: relative;
        z-index: 1;
        width: min(58vw, 420px);
        height: min(74vh, 560px);
        display: grid;
        place-items: end center;
      }

      .player img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center bottom;
        mix-blend-mode: screen;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <main class="stage" aria-label="足球角色帧动画">
      <div class="player">
        <img id="frameImage" src="../image/figure/初始人物/人设图_站立背影.png" alt="足球角色" draggable="false" />
      </div>
    </main>

    <script>
      const frameImage = document.querySelector("#frameImage");
      const frames = [
        "../image/figure/初始人物/人设图_站立背影.png",
        "../image/figure/初始人物/助跑.png",
        "../image/figure/初始人物/触球瞬间.png",
        "../image/figure/初始人物/踢球.png",
      ];

      let timer = null;

      frames.forEach((src) => {
        const image = new Image();
        image.src = src;
      });

      function playAnimation() {
        if (timer) {
          clearTimeout(timer);
        }

        let index = 0;
        frameImage.src = frames[index];

        const next = () => {
          index += 1;
          frameImage.src = frames[index];

          if (index < frames.length - 1) {
            timer = setTimeout(next, 150);
          } else {
            timer = null;
          }
        };

        timer = setTimeout(next, 150);
      }

      window.addEventListener("pointerdown", playAnimation);
      window.addEventListener("keydown", (event) => {
        if (event.code === "Space") {
          event.preventDefault();
          playAnimation();
        }
      });
    </script>
  </body>
</html>
